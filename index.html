<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e0e0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="G.HUB">
<title>G.HUB — Painel Executivo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--bg2:#141416;--bg3:#1a1a1d;--bg4:#202024;
  --border:#2a2a2e;--border2:#333338;
  --gold:#c9a84c;--gold2:#e8c97a;--gold-dim:#7a6128;
  --gold-bg:rgba(201,168,76,0.08);--gold-bg2:rgba(201,168,76,0.15);
  --text:#f0ede8;--text2:#9b9892;--text3:#5c5a56;
  --danger:#c45a5a;--danger-bg:rgba(196,90,90,0.12);
  --mali:#4aad82;--mali-bg:rgba(74,173,130,0.1);
  --pes:#c47a4a;
  --comp:#9b6fc4;--comp-bg:rgba(155,111,196,0.12);
  --imann:#4a8fc4;--imann-bg:rgba(74,143,196,0.1);
  --r:8px;--r2:12px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.shell{display:grid;grid-template-rows:auto auto auto auto 1fr;height:100vh;overflow:hidden}
.header{padding:14px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
.logo{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:var(--text);letter-spacing:-0.5px;line-height:1}
.logo em{color:var(--gold);font-style:normal}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.header-right{display:flex;align-items:center;gap:6px;padding-top:2px;flex-wrap:wrap}
.pill{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:20px;letter-spacing:0.3px;white-space:nowrap}
.sync-pill{cursor:pointer;transition:all 0.2s;color:var(--text3)}
.sync-pill.ok{color:var(--mali);border-color:rgba(74,173,130,0.3)}
.sync-pill.err{color:var(--danger);border-color:rgba(196,90,90,0.3)}
.sync-pill.syncing{color:var(--gold);border-color:var(--gold-dim)}
.notif-pill{cursor:pointer;transition:all 0.2s;color:var(--text3)}
.notif-pill.on{color:var(--gold);border-color:var(--gold-dim);background:var(--gold-bg)}
.frase-bar{padding:8px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.frase-input{flex:1;font-size:12px;font-family:'DM Mono',monospace;background:transparent;border:none;outline:none;color:var(--text2);letter-spacing:0.3px}
.frase-input::placeholder{color:var(--text3)}
.frase-icon{font-size:11px;color:var(--gold);flex-shrink:0}
.tabs-bar{display:flex;padding:12px 20px 0;border-bottom:1px solid var(--border);overflow-x:auto;gap:0}
.tab{font-size:13px;padding:8px 16px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--gold)}
.tab-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;opacity:0.6}
.tab.active .tab-dot{opacity:1}
.dot-i{background:#c9a84c}.dot-m{background:#c47a4a}.dot-p{background:#4aad82}
.subtabs-bar{display:flex;padding:0 20px;border-bottom:1px solid var(--border);overflow-x:auto;gap:0;background:var(--bg2);flex-shrink:0}
.subtab{font-size:11px;font-family:'DM Mono',monospace;padding:7px 14px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;white-space:nowrap;letter-spacing:0.5px;text-transform:uppercase}
.subtab:hover{color:var(--text2)}
.subtab.active{font-weight:500}
.subtab.ml.active{color:#ffe500;border-bottom-color:#ffe500}
.subtab.shopee.active{color:#f26522;border-bottom-color:#f26522}
.subtab.tiktok.active{color:#00f2ea;border-bottom-color:#00f2ea}
.subtab.piracaia.active{color:var(--mali);border-bottom-color:var(--mali)}
.subtab.pinhalzinho.active{color:var(--comp);border-bottom-color:var(--comp)}
.subtab.geral.active{color:var(--gold);border-bottom-color:var(--gold)}
.board{overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.capture-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;display:flex;flex-direction:column;gap:10px;transition:border-color 0.2s}
.capture-card:focus-within{border-color:var(--border2)}
.capture-row{display:flex;gap:7px;flex-wrap:wrap}
.c-input{flex:1;min-width:160px;font-size:13px;font-family:'DM Sans',sans-serif;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text);outline:none;transition:border 0.2s}
.c-input:focus{border-color:var(--gold-dim)}
.c-input::placeholder{color:var(--text3)}
.c-date{font-size:11px;font-family:'DM Mono',monospace;padding:9px 8px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text2);outline:none;color-scheme:dark;width:130px}
.c-date:focus{border-color:var(--gold-dim)}
.add-btn{font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;padding:9px 16px;border-radius:var(--r);border:1px solid var(--gold-dim);background:var(--gold-bg);cursor:pointer;color:var(--gold2);transition:all 0.2s;white-space:nowrap}
.add-btn:hover{background:var(--gold-bg2);border-color:var(--gold)}
.type-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.type-lbl{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace}
.t-btn{font-size:11px;font-family:'DM Sans',sans-serif;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text3);transition:all 0.2s}
.t-btn:hover{border-color:var(--border2);color:var(--text2)}
.t-btn.sel{background:var(--bg4);border-color:var(--border2);color:var(--text);font-weight:500}
.k-title{font-family:'Playfair Display',serif;font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.k-badge{font-family:'DM Mono',monospace;font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:2px 8px;color:var(--text3)}
.kanban-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.k-col{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px;min-height:80px}
.k-col.backdo{border-style:dashed;background:transparent}
.k-col-head{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.k-col-head span{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:1px 5px;font-size:8px}
.cards-wrap{display:flex;flex-direction:column;gap:5px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;transition:all 0.18s;position:relative;animation:fadeIn 0.2s ease;user-select:none;-webkit-user-select:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:var(--border2);background:var(--bg4)}
.card.done{opacity:0.38}
.card.done .card-txt{text-decoration:line-through;color:var(--text3)}
.card.backdo-style{border-style:dashed;opacity:0.7}
.card.backdo-style:hover{opacity:1}
.card-top{display:flex;gap:7px;align-items:flex-start}
.chk{width:14px;height:14px;min-width:14px;border:1px solid var(--border2);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all 0.15s;flex-shrink:0}
.chk.on{background:var(--gold);border-color:var(--gold)}
.chk.on::after{content:'';display:block;width:6px;height:3px;border-left:1.5px solid #0e0e0f;border-bottom:1.5px solid #0e0e0f;transform:rotate(-45deg) translateY(-1px)}
.card-txt{font-size:12px;color:var(--text);line-height:1.4;flex:1;word-break:break-word}
.card-foot{display:flex;align-items:center;gap:5px;margin-top:6px;padding-left:21px;flex-wrap:wrap}
.badge{font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:20px;letter-spacing:0.3px}
.badge.tarefa{background:var(--imann-bg);color:var(--imann)}
.badge.ideia{background:var(--gold-bg);color:var(--gold)}
.badge.conta{background:var(--danger-bg);color:var(--danger)}
.badge.rotina{background:var(--mali-bg);color:var(--mali)}
.badge.urgente{background:rgba(196,122,74,0.15);color:var(--pes)}
.badge.compromisso{background:var(--comp-bg);color:var(--comp)}
.card-date{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3)}
.card-del{font-size:9px;color:var(--text3);margin-left:auto;opacity:0;cursor:pointer;transition:opacity 0.15s;flex-shrink:0}
.card:hover .card-del{opacity:1}
.card-del:hover{color:var(--danger)}
.move-menu{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:8px;z-index:500;display:none;flex-direction:column;gap:4px;min-width:160px}
.move-menu.open{display:flex}
.move-menu-title{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:4px 8px;margin-bottom:2px}
.move-opt{font-size:12px;font-family:'DM Sans',sans-serif;padding:7px 10px;border-radius:var(--r);cursor:pointer;color:var(--text2);transition:all 0.15s;border:none;background:transparent;text-align:left;width:100%}
.move-opt:hover{background:var(--bg3);color:var(--text)}
.contas-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px}
.sec-hd{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.add-conta-btn{font-size:10px;font-family:'DM Sans',sans-serif;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text3);transition:all 0.2s}
.add-conta-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.conta-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.conta-row:last-child{border-bottom:none;padding-bottom:0}
.c-chk{width:14px;height:14px;min-width:14px;border:1px solid var(--border2);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.c-chk.paid{background:var(--mali);border-color:var(--mali)}
.c-chk.paid::after{content:'';display:block;width:6px;height:3px;border-left:1.5px solid #0e0e0f;border-bottom:1.5px solid #0e0e0f;transform:rotate(-45deg) translateY(-1px)}
.conta-info{flex:1;min-width:0}
.conta-nm{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conta-dt{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);margin-top:1px}
.conta-recorr{font-size:9px;font-family:'DM Mono',monospace;color:var(--comp);margin-top:1px}
.conta-val{font-size:11px;font-family:'DM Mono',monospace;white-space:nowrap}
.conta-val.vence{color:var(--danger)}
.conta-val.ok{color:var(--mali)}
.conta-val.pago{color:var(--text3);text-decoration:line-through}
.no-items{font-size:11px;color:var(--text3);padding:6px 0;font-family:'DM Mono',monospace}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:8px 16px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);letter-spacing:0.3px;opacity:0;transition:all 0.25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:22px;width:320px;display:flex;flex-direction:column;gap:11px;max-height:90vh;overflow-y:auto}
.modal h3{font-family:'Playfair Display',serif;font-size:15px;color:var(--text)}
.modal input,.modal select{width:100%;font-size:12px;font-family:'DM Sans',sans-serif;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text);outline:none}
.modal input:focus,.modal select:focus{border-color:var(--gold-dim)}
.modal input::placeholder{color:var(--text3)}
.modal select option{background:var(--bg3)}
.modal-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:-6px}
.modal-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:4px}
.m-cancel{font-size:11px;padding:7px 13px;border-radius:var(--r);border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text3);font-family:'DM Sans',sans-serif;transition:all 0.2s}
.m-cancel:hover{color:var(--text2);border-color:var(--border2)}
.m-ok{font-size:11px;padding:7px 13px;border-radius:var(--r);border:1px solid var(--gold-dim);background:var(--gold-bg);cursor:pointer;color:var(--gold2);font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.2s}
.m-ok:hover{background:var(--gold);color:#0e0e0f;border-color:var(--gold)}
@media(max-width:600px){
  .kanban-cols{grid-template-columns:repeat(2,1fr)}
  .header,.board,.tabs-bar{padding-left:14px;padding-right:14px}
  .subtabs-bar,.frase-bar{padding-left:14px;padding-right:14px}
}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div>
      <div class="logo">G<em>.</em>HUB</div>
      <div class="logo-sub">Painel Executivo</div>
    </div>
    <div class="header-right">
      <div class="pill" id="datePill"></div>
      <div class="pill sync-pill" id="syncPill" onclick="syncNow()">sync</div>
      <div class="pill notif-pill" id="notifPill" onclick="toggleNotif()">notif off</div>
    </div>
  </div>
  <div class="frase-bar">
    <span class="frase-icon">✦</span>
    <input class="frase-input" id="fraseInput" placeholder="Palavra de Deus, dado importante, motivação..." maxlength="200" oninput="saveFrase()">
  </div>
  <div class="tabs-bar">
    <div class="tab active" data-area="imann" onclick="setArea('imann',this)"><span class="tab-dot dot-i"></span>ImannuStore</div>
    <div class="tab" data-area="mali" onclick="setArea('mali',this)"><span class="tab-dot dot-m"></span>Ótica Ma&Li</div>
    <div class="tab" data-area="pes" onclick="setArea('pes',this)"><span class="tab-dot dot-p"></span>Pessoal</div>
  </div>
  <div class="subtabs-bar" id="subtabsBar"></div>
  <div class="board" id="board"></div>
</div>

<div class="move-menu" id="moveMenu">
  <div class="move-menu-title">Mover para</div>
  <button class="move-opt" onclick="moveCardTo('todo')">A fazer</button>
  <button class="move-opt" onclick="moveCardTo('doing')">Andamento</button>
  <button class="move-opt" onclick="moveCardTo('done')">Concluído</button>
  <button class="move-opt" onclick="moveCardTo('backdo')">BackDo</button>
</div>

<div class="modal-bg" id="contaModal">
  <div class="modal">
    <h3>Nova conta</h3>
    <div class="modal-label">Nome</div>
    <input id="mNome" placeholder="Ex: Fornecedor China">
    <div class="modal-label">Valor (R$)</div>
    <input id="mValor" placeholder="850.00" type="number" step="0.01">
    <div class="modal-label">Vencimento</div>
    <input id="mDate" type="date">
    <div class="modal-label">Recorrência</div>
    <select id="mRecorr">
      <option value="">Sem recorrência</option>
      <option value="semanal">Semanal</option>
      <option value="mensal">Mensal</option>
      <option value="bimestral">Bimestral</option>
      <option value="trimestral">Trimestral</option>
      <option value="semestral">Semestral</option>
      <option value="anual">Anual</option>
    </select>
    <div class="modal-label" id="parcelasLbl" style="display:none">Nº de parcelas</div>
    <input id="mParcelas" type="number" min="2" max="120" placeholder="Ex: 12" style="display:none">
    <div class="modal-btns">
      <button class="m-cancel" onclick="closeModal()">Cancelar</button>
      <button class="m-ok" onclick="saveConta()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://efyvmmgyubsflpqogvkc.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmeXZtbWd5dWJzZmxwcW9ndmtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MjA4NjUsImV4cCI6MjA5MTA5Njg2NX0.XlW78wldjVybf9e0wrpkf43kaQLJYIpb7-zp6GtvZRc';
const SUBTABS={imann:[{id:'ml',label:'Mercado Livre',cls:'ml'},{id:'shopee',label:'Shopee',cls:'shopee'},{id:'tiktok',label:'TikTok Shop',cls:'tiktok'}],mali:[{id:'piracaia',label:'Piracaia',cls:'piracaia'},{id:'pinhalzinho',label:'Pinhalzinho',cls:'pinhalzinho'}],pes:[{id:'geral',label:'Geral',cls:'geral'}]};
const COLS=['todo','doing','done','backdo'];
const COL_LABELS={todo:'A fazer',doing:'Andamento',done:'Concluído',backdo:'BackDo'};
let area='imann',sub='ml',tipo='tarefa',data={},notifOn=false,notifTimer=null,moveCardId=null,lpTimer=null;

async function sbGet(){try{const r=await fetch(SUPA_URL+'/rest/v1/ghq_data?id=eq.gabriel&select=payload',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});if(!r.ok)throw 0;const rows=await r.json();return rows.length?rows[0].payload:null;}catch(e){return null}}
async function sbSet(p){try{const r=await fetch(SUPA_URL+'/rest/v1/ghq_data',{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body:JSON.stringify({id:'gabriel',payload:p,updated_at:new Date().toISOString()})});return r.ok;}catch(e){return false}}
function setSS(s){const el=document.getElementById('syncPill');el.className='pill sync-pill '+s;el.textContent={ok:'sincronizado',err:'erro sync',syncing:'sincronizando...'}[s]||'sync';}
async function syncNow(silent){setSS('syncing');const rem=await sbGet();if(rem&&(rem._ts||0)>(data._ts||0)){Object.assign(data,rem);saveLocal();render();if(!silent)toast('Sincronizado ✓');}data._ts=Date.now();const ok=await sbSet(data);setSS(ok?'ok':'err');}
async function pushData(){data._ts=Date.now();saveLocal();setSS('syncing');const ok=await sbSet(data);setSS(ok?'ok':'err');}
function saveLocal(){localStorage.setItem('ghub1',JSON.stringify(data))}
function initData(){const s=localStorage.getItem('ghub1');if(s){try{data=JSON.parse(s)}catch(e){data={}}}['imann','mali','pes'].forEach(a=>{if(!data[a])data[a]={};SUBTABS[a].forEach(st=>{if(!data[a][st.id])data[a][st.id]={cards:[],contas:[]};});});if(!data.frase)data.frase='';if(data.notifOn===undefined)data.notifOn=false;}
function cur(){return data[area][sub]}
function setArea(a,el){area=a;sub=SUBTABS[a][0].id;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderSubs();render();}
function setSub(s,el){sub=s;document.querySelectorAll('.subtab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}
function renderSubs(){document.getElementById('subtabsBar').innerHTML=SUBTABS[area].map(st=>`<div class="subtab ${st.cls}${st.id===sub?' active':''}" onclick="setSub('${st.id}',this)">${st.label}</div>`).join('');}
function selType(el){document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');tipo=el.dataset.t;}
function doAdd(){const txt=document.getElementById('capIn').value.trim();if(!txt)return;const dt=document.getElementById('capDate').value;cur().cards.unshift({id:Date.now(),txt,tipo,col:'todo',done:false,dt});document.getElementById('capIn').value='';document.getElementById('capDate').value='';render();pushData();toast('Adicionado ✓');}
function openMoveMenu(id,ev){ev.preventDefault();ev.stopPropagation();moveCardId=id;const menu=document.getElementById('moveMenu');menu.classList.add('open');const cx=ev.clientX||ev.pageX||100;const cy=ev.clientY||ev.pageY||100;menu.style.left=Math.min(cx,window.innerWidth-170)+'px';menu.style.top=Math.min(cy,window.innerHeight-200)+'px';}
function moveCardTo(col){const c=cur().cards.find(x=>x.id===moveCardId);if(c){c.col=col;c.done=col==='done';}closeMoveMenu();render();pushData();}
function closeMoveMenu(){document.getElementById('moveMenu').classList.remove('open');moveCardId=null;}
function startLP(id,ev){lpTimer=setTimeout(()=>{const t=ev.touches[0];openMoveMenu(id,{preventDefault:()=>{},stopPropagation:()=>{},clientX:t.clientX,clientY:t.clientY});},500);}
function cancelLP(){clearTimeout(lpTimer);}
function checkCard(id){const c=cur().cards.find(x=>x.id===id);if(!c)return;const i=COLS.indexOf(c.col);c.col=COLS[(i+1)%COLS.length];c.done=c.col==='done';render();pushData();}
function delCard(id,e){e.stopPropagation();cur().cards=cur().cards.filter(x=>x.id!==id);render();pushData();toast('Removido');}
function toggleConta(i){const c=cur().contas[i];c.paid=!c.paid;if(c.paid&&c.recorr&&c.dt){if(c.parcelas){c.parcelaAtual=(c.parcelaAtual||1)+1;if(c.parcelaAtual>c.parcelas){cur().contas.splice(i,1);render();pushData();toast('Conta quitada ✓');return;}}c.dt=nextDate(c.dt,c.recorr);c.paid=false;}render();pushData();}
function nextDate(dt,r){const d=new Date(dt+'T12:00:00');const m={semanal:7,bimestral:60,trimestral:90,semestral:180};if(m[r])d.setDate(d.getDate()+m[r]);else if(r==='mensal')d.setMonth(d.getMonth()+1);else if(r==='anual')d.setFullYear(d.getFullYear()+1);return d.toISOString().split('T')[0];}
function render(){
  const board=document.getElementById('board');
  const today=new Date().toISOString().split('T')[0];
  const cards=cur().cards;
  const contas=cur().contas;
  board.innerHTML=`
<div class="capture-card">
  <div class="capture-row">
    <input class="c-input" id="capIn" placeholder="Ideia, tarefa, compromisso..." onkeydown="if(event.key==='Enter')doAdd()">
    <input type="date" class="c-date" id="capDate">
    <button class="add-btn" onclick="doAdd()">+ Add</button>
  </div>
  <div class="type-row">
    <span class="type-lbl">Tipo</span>
    ${['tarefa','ideia','compromisso','conta','rotina','urgente'].map(t=>`<button class="t-btn${tipo===t?' sel':''}" data-t="${t}" onclick="selType(this)">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
  </div>
</div>
<div>
  <div class="k-title"><span>Quadro</span><span class="k-badge">${cards.filter(c=>c.col!=='done').length} ativas</span></div>
  <div class="kanban-cols">
    ${COLS.map(col=>`
      <div class="k-col${col==='backdo'?' backdo':''}">
        <div class="k-col-head">${COL_LABELS[col]} <span>${cards.filter(c=>c.col===col).length}</span></div>
        <div class="cards-wrap">
          ${cards.filter(c=>c.col===col).map(c=>`
            <div class="card${c.done?' done':''}${col==='backdo'?' backdo-style':''}"
              oncontextmenu="openMoveMenu(${c.id},event)"
              ontouchstart="startLP(${c.id},event)"
              ontouchend="cancelLP()"
              ontouchmove="cancelLP()">
              <div class="card-top">
                <div class="chk${c.done?' on':''}" onclick="checkCard(${c.id})"></div>
                <span class="card-txt">${esc(c.txt)}</span>
              </div>
              <div class="card-foot">
                <span class="badge ${c.tipo}">${c.tipo}</span>
                ${c.dt?`<span class="card-date">${fmtD(c.dt)}</span>`:''}
                <span class="card-del" onclick="delCard(${c.id},event)">remover</span>
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('')}
  </div>
</div>
<div class="contas-wrap">
  <div class="sec-hd"><span>Contas & vencimentos</span><button class="add-conta-btn" onclick="openModal()">+ Nova conta</button></div>
  <div>${contas.length?contas.map((c,i)=>{const vence=c.dt&&c.dt<=today&&!c.paid;const rl=c.recorr?'↻ '+c.recorr+(c.parcelas?' · '+(c.parcelaAtual||1)+'/'+c.parcelas:''):'';return`<div class="conta-row"><div class="c-chk${c.paid?' paid':''}" onclick="toggleConta(${i})"></div><div class="conta-info"><div class="conta-nm">${esc(c.nome)}</div>${c.dt?'<div class="conta-dt">vence '+fmtD(c.dt)+'</div>':''}${rl?'<div class="conta-recorr">'+rl+'</div>':''}</div><span class="conta-val ${c.paid?'pago':vence?'vence':'ok'}">R$ ${parseFloat(c.valor||0).toFixed(2)}</span></div>`;}).join(''):'<div class="no-items">Nenhuma conta cadastrada</div>'}</div>
</div>`;
}
function openModal(){document.getElementById('contaModal').classList.add('open');document.getElementById('mRecorr').onchange=function(){const v=this.value!=='';document.getElementById('parcelasLbl').style.display=v?'block':'none';document.getElementById('mParcelas').style.display=v?'block':'none';};}
function closeModal(){document.getElementById('contaModal').classList.remove('open')}
function saveConta(){const nome=document.getElementById('mNome').value.trim();if(!nome)return;const valor=document.getElementById('mValor').value||'0';const dt=document.getElementById('mDate').value;const recorr=document.getElementById('mRecorr').value;const parcelas=parseInt(document.getElementById('mParcelas').value)||null;cur().contas.push({nome,valor,dt,paid:false,recorr,parcelas,parcelaAtual:1});closeModal();['mNome','mValor','mDate'].forEach(id=>document.getElementById(id).value='');document.getElementById('mRecorr').value='';render();pushData();toast('Conta adicionada ✓');}
function saveFrase(){data.frase=document.getElementById('fraseInput').value;saveLocal();clearTimeout(saveFrase._t);saveFrase._t=setTimeout(()=>sbSet(data),2000);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtD(d){if(!d)return'';const[y,m,day]=d.split('-');return day+'/'+m+'/'+y}
function setDatePill(){const n=new Date();const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];document.getElementById('datePill').textContent=dias[n.getDay()]+' '+n.getDate()+' '+meses[n.getMonth()];}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function toggleNotif(){if(!('Notification' in window)){toast('Browser não suporta notificações');return}if(!notifOn){Notification.requestPermission().then(p=>{if(p==='granted'){notifOn=true;data.notifOn=true;saveLocal();document.getElementById('notifPill').textContent='notif on';document.getElementById('notifPill').classList.add('on');checkNotifs();notifTimer=setInterval(checkNotifs,3600000);toast('Notificações ativadas ✓');}else toast('Permissão negada');});}else{notifOn=false;data.notifOn=false;saveLocal();document.getElementById('notifPill').textContent='notif off';document.getElementById('notifPill').classList.remove('on');clearInterval(notifTimer);toast('Notificações desligadas');}}
function checkNotifs(){const today=new Date().toISOString().split('T')[0];['imann','mali','pes'].forEach(a=>{SUBTABS[a].forEach(st=>{const s=data[a]&&data[a][st.id];if(!s)return;s.contas.forEach(c=>{if(!c.paid&&c.dt&&c.dt<=today)new Notification('G.HUB — Vencimento',{body:c.nome+' — R$ '+parseFloat(c.valor||0).toFixed(2)});});});});}
function restoreNotif(){if(data.notifOn&&'Notification' in window&&Notification.permission==='granted'){notifOn=true;document.getElementById('notifPill').textContent='notif on';document.getElementById('notifPill').classList.add('on');checkNotifs();notifTimer=setInterval(checkNotifs,3600000);}}
document.addEventListener('click',e=>{if(!document.getElementById('moveMenu').contains(e.target))closeMoveMenu();});
document.getElementById('contaModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
if('serviceWorker' in navigator){const sw="const C='ghub-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>{if(e.request.url.includes('supabase.co')||e.request.url.includes('googleapis.com')){e.respondWith(fetch(e.request).catch(()=>new Response('',{status:503})));return;}e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});";const blob=new Blob([sw],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});}
initData();setDatePill();renderSubs();render();setSS('');if(data.frase)document.getElementById('fraseInput').value=data.frase;restoreNotif();syncNow(true);setInterval(()=>syncNow(true),120000);
</script>
</body>
</html>
